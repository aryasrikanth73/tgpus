<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Job Application Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(120deg, #e0eaff, #f8fbff);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .form-container {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      padding: 35px 40px;
      border-radius: 16px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
    }

    .form-header {
      text-align: center;
      margin-bottom: 25px;
    }

    .form-header h2 {
      margin: 0;
      font-size: 26px;
      color: #1f2933;
      letter-spacing: 0.5px;
    }

    .form-header p {
      margin: 8px 0 0;
      color: #6b7280;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      color: #374151;
      font-size: 14px;
    }

    .form-control,
    .form-select {
      width: 100%;
      padding: 11px 12px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-control:focus,
    .form-select:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
    }

    .radio-group {
      display: flex;
      gap: 20px;
      margin-top: 6px;
    }

    .radio-group label {
      font-weight: 500;
      font-size: 14px;
      color: #374151;
      cursor: pointer;
    }

    .radio-group input {
      margin-right: 6px;
    }

    .range-value {
      font-weight: 600;
      color: #4f46e5;
    }

    .submit-btn {
      width: 100%;
      margin-top: 10px;
      padding: 13px;
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      border: none;
      border-radius: 12px;
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(79, 70, 229, 0.35);
    }

    @media (max-width: 480px) {
      .form-container {
        padding: 25px 22px;
      }
    }
  </style>
</head>
<body>

  <div class="form-container">

    <!-- Heading -->
    <div class="form-header">
      <h2>Job Application Form</h2>
      <p>Please fill in your details to apply for the job</p>
    </div>

    <!-- Form -->
    <form id="jobApplicationForm">

      <!-- Name -->
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" class="form-control" required>
      </div>

      <!-- Gender -->
      <div class="form-group">
        <label>Gender</label>
        <div class="radio-group">
          <label>
            <input type="radio" name="gender" value="Male" required> Male
          </label>
          <label>
            <input type="radio" name="gender" value="Female"> Female
          </label>
        </div>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" class="form-control" required>
      </div>

      <!-- Phone -->
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" class="form-control" required>
      </div>

      <!-- Job Role -->
      <div class="form-group">
        <label for="job_role">Job Role</label>
        <select id="job_role" name="job_role" class="form-select" required>
          <option value="">Select Job Role</option>
          <option value="Frontend Developer">Frontend Developer</option>
          <option value="Backend Developer">Backend Developer</option>
          <option value="Full Stack Developer">Full Stack Developer</option>
          <option value="UI/UX Designer">UI/UX Designer</option>
          <option value="QA Engineer">QA Engineer</option>
        </select>
      </div>

      <!-- Percentage -->
      <div class="form-group">
        <label for="percentage">
          Degree Percentage: <span id="percentageValue" class="range-value">60</span>%
        </label>
        <input
          type="range"
          id="percentage"
          name="percentage"
          min="0"
          max="100"
          value="60"
          class="form-control"
          oninput="document.getElementById('percentageValue').innerText = this.value">
      </div>

      <!-- DOB -->
      <div class="form-group">
        <label for="dob">Date of Birth</label>
        <input type="date" id="dob" name="dob" class="form-control" required>
      </div>

      <!-- Submit -->
      <button type="submit" class="submit-btn">
        Apply Now
      </button>

    </form>

  </div>

</body>
</html>
