<style>
/* Full page layout */
.page-wrapper {
  min-height: 100vh;
  display: flex;
  justify-content: flex-start;   /* push form to right */
  align-items: center;         /* center vertically */
  background: linear-gradient(120deg, #f0f4ff, #e6f7ff);
  padding: 20px;
}

/* Form container */
.form-wrapper {
  width: 50%;                  /* half screen */
  max-width: 520px;            /* prevent too wide */
  background: #ffffff;
  padding: 30px 35px;
  border-radius: 14px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
}

/* Inputs look cleaner */
.form-control,
.form-select,
.form-range {
  border-radius: 8px;
}

/* Button full width */
.btn-block {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  border-radius: 10px;
}

/* Responsive: full width on mobile */
@media (max-width: 768px) {
  .form-wrapper {
    width: 100%;
    max-width: 100%;
  }
}

</style>

<div class="page-wrapper">
  <div class="form-wrapper">

 <form id="miniForm">

  <!-- Gender (Radio) -->
  <div class="mb-4">
    <label class="form-label d-block">Gender</label>
    <div class="form-check form-check-inline">
      <input class="form-check-input" type="radio" id="gender_male" name="gender" value="Male" required>
      <label class="form-check-label" for="gender_male">Male</label>
    </div>
    <div class="form-check form-check-inline">
      <input class="form-check-input" type="radio" id="gender_female" name="gender" value="Female">
      <label class="form-check-label" for="gender_female">Female</label>
    </div>
  </div>

  <!-- Country (Dropdown) -->
  <div class="form-outline mb-4">
    <select id="country" name="country" class="form-select" required>
      <option value="">Select Country</option>
      <option value="India">India</option>
      <option value="USA">USA</option>
      <option value="UK">UK</option>
    </select>
    <label class="form-label" for="country">Country</label>
  </div>

  <!-- Satisfaction (Range) -->
  <div class="mb-4">
    <label class="form-label d-block" for="satisfaction">
      Satisfaction Level: <span id="rangeValue">5</span>
    </label>
    <input 
      type="range" 
      id="satisfaction" 
      name="satisfaction" 
      class="form-range" 
      min="0" 
      max="10" 
      value="5"
      oninput="document.getElementById('rangeValue').innerText = this.value">
  </div>

  <!-- Submit -->
  <button class="btn btn-info btn-block" type="submit">Submit</button>

</form>


  </div>
</div>
